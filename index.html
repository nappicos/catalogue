<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🚀 Ассортимент саженцев</title>
    <style>
        /* --- RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(ellipse at 30% 40%, #010110, #000000);
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 12px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;
        }

        /* --- STARS & PLANETS --- */
        .star {
            position: fixed;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: starGlow 4s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes starGlow {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        .planet {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .earth {
            top: 10%;
            left: 3%;
            animation: floatEarth 20s infinite alternate;
        }
        .moon {
            bottom: 8%;
            right: 3%;
            animation: floatMoon 18s infinite alternate;
        }
        .mars {
            top: 70%;
            left: 85%;
            animation: floatMars 22s infinite alternate;
        }
        .rocket {
            position: fixed;
            bottom: 3%;
            left: 2%;
            font-size: 2rem;
            pointer-events: none;
            animation: flyRocket 15s infinite linear;
            z-index: 0;
            opacity: 0.5;
        }
        @keyframes floatEarth {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 20px); }
        }
        @keyframes floatMoon {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-20px, -15px); }
        }
        @keyframes floatMars {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, -20px); }
        }
        @keyframes flyRocket {
            0% { transform: translateX(0); }
            100% { transform: translateX(1500px); }
        }

        /* --- CONTAINER --- */
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(3, 8, 20, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 16px;
            border: 1px solid rgba(0, 200, 255, 0.5);
            z-index: 2;
            margin: 10px auto;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #aaddff, #3388ff, #ff66cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
        }
        .subhead {
            font-size: 0.8rem;
            color: #bbddff;
            border-top: 1px solid rgba(0, 200, 255, 0.3);
            display: inline-block;
            padding-top: 0.3rem;
        }

        /* --- SEARCH --- */
        .search-box {
            width: 100%;
            padding: 10px 16px;
            border-radius: 30px;
            border: 2px solid #44aaff;
            background: #0a1a2a;
            color: #f0fcff;
            font-size: 1rem;
            outline: none;
            margin-bottom: 16px;
        }
        .search-box::placeholder {
            color: #88ccff;
            opacity: 0.7;
        }
        .search-box:focus {
            border-color: cyan;
            box-shadow: 0 0 12px cyan;
        }

        /* --- RESULTS COUNT --- */
        .results-count {
            color: #aaffdd;
            font-size: 0.8rem;
            margin-bottom: 12px;
            text-align: right;
        }

        /* --- PLANT CARDS (search results) --- */
        .plant-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .plant-card {
            background: #0a1022cc;
            border-radius: 20px;
            border: 1px solid #5599dd;
            overflow: hidden;
            transition: all 0.2s;
        }
        .plant-card:hover {
            border-color: cyan;
        }
        .plant-header {
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #11223c;
            color: #e6f7ff;
        }
        .plant-header .plant-name {
            font-weight: bold;
            font-size: 0.95rem;
            flex: 1;
        }
        .plant-header .plant-size {
            font-size: 0.7rem;
            color: #88ddff;
            margin-right: 12px;
            white-space: nowrap;
        }
        .plant-header .toggle-icon {
            font-size: 1.2rem;
            color: #88ddff;
            transition: transform 0.3s;
        }
        .plant-header .toggle-icon.open {
            transform: rotate(180deg);
        }

        /* --- VARIETIES (inside plant) --- */
        .varieties-container {
            padding: 0 14px 14px 14px;
            display: none;
            flex-direction: column;
            gap: 6px;
        }
        .varieties-container.open {
            display: flex;
        }
        .variety-item {
            background: #0a1a2a;
            border-radius: 14px;
            border-left: 3px solid #44aaff;
            overflow: hidden;
        }
        .variety-header {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ddf4ff;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .variety-header:hover {
            background: #1a2a4a;
        }
        .variety-header .variety-name {
            font-weight: 500;
        }
        .variety-header .variety-toggle {
            font-size: 0.8rem;
            color: #88ddff;
            transition: transform 0.3s;
        }
        .variety-header .variety-toggle.open {
            transform: rotate(180deg);
        }
        .variety-description {
            padding: 0 12px 12px 12px;
            font-size: 0.8rem;
            color: #cceeff;
            line-height: 1.5;
            display: none;
        }
        .variety-description.open {
            display: block;
        }
        .variety-description .info-link {
            color: #66ccff;
            text-decoration: none;
            display: inline-block;
            margin-top: 6px;
            font-size: 0.75rem;
        }
        .variety-description .info-link:hover {
            text-decoration: underline;
        }

        /* --- NO RESULTS --- */
        .no-results {
            color: #ff8888;
            text-align: center;
            padding: 30px 0;
            font-size: 0.95rem;
        }

        /* --- FOOTER --- */
        .footer-note {
            text-align: center;
            color: #88aaff;
            font-size: 0.7rem;
            margin-top: 16px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 550px) {
            .plant-header .plant-name {
                font-size: 0.85rem;
            }
            .plant-header .plant-size {
                font-size: 0.6rem;
                margin-right: 8px;
            }
            .variety-header {
                font-size: 0.8rem;
                padding: 6px 10px;
            }
            .variety-description {
                font-size: 0.75rem;
                padding: 0 10px 10px 10px;
            }
            h1 {
                font-size: 1.3rem;
            }
            .container {
                padding: 12px;
            }
        }
    </style>
</head>

            s.style.left = Math.random() * 100 + '%';

            s.style.animationDelay = Math.random() * 5 + 's';

            description: "Жимолость – ягодный кустарник с полезными и вкусными плодами. Сорта отличаются высокой урожайностью и морозостойкостью. Ягоды созревают одними из первых."
        }, {
            name: "Грецкий орех",
            size: "",
            infoLink: "",
            varieties: [
                "Чандлер"
            ],
            description: "Грецкий орех – ценная орехоплодная культура. Орехи крупные, вкусные, богаты полезными жирами и микроэлементами. Дерево долговечное, устойчивое к морозам."
        }, {
            name: "Ежевика",
            size: "",
            infoLink: "",
            varieties: [
                "Честер", "Блек сатин", "Киова",
                "Ежемалина Тайберри", "Ежемалина Логанберри",
                "Ежемалина Кумберленд"
            ],
            description: "Ежевика – ягодный кустарник с крупными, сладкими ягодами. Сорта отличаются высокой урожайностью и устойчивостью к болезням. Ягоды используются в свежем виде и для переработки."
        }, {
            name: "Диплоидная Слива",
            size: "",
            infoLink: "",
            varieties: [
                "Голден Плумза", "Старкинг Делишес", "Байрон Голд",
                "То Че Сан", "Блэк Амбер", "Анжелино"
            ],
            description: "Диплоидные сорта сливы с крупными, сладкими плодами. Отличаются высокой урожайностью и устойчивостью к болезням. Плоды хороши для употребления в свежем виде и переработки."
        }];

        // ================================================================
        //  ПРИЛОЖЕНИЕ
        // ================================================================

        const searchInput = document.getElementById('searchInput');
        const plantList = document.getElementById('plantList');
        const resultsCount = document.getElementById('resultsCount');

        function renderCatalog(filter = '') {
            const query = filter.toLowerCase().trim();
            let results = [];

            if (!query) {
                results = catalogData;
            } else {
                // Ищем по названию растения и по названиям сортов
                results = catalogData.filter(plant => {
                    const plantMatch = plant.name.toLowerCase().includes(query);
                    const varietyMatch = plant.varieties.some(v => {
                        const vName = typeof v === 'string' ? v : v.name;
                        return vName.toLowerCase().includes(query);
                    });
                    return plantMatch || varietyMatch;
                });
            }

            // Сортировка по алфавиту
            results.sort((a, b) => a.name.localeCompare(b.name));

            resultsCount.textContent = `Найдено: ${results.length}`;

            if (results.length === 0) {
                plantList.innerHTML = `<div class="no-results">😔 Ничего не найдено по запросу "${filter}"</div>`;
                return;
            }

            let html = '';
            results.forEach((plant, idx) => {
                const plantId = `plant-${idx}`;
                const varieties = plant.varieties.map(v => {
                    if (typeof v === 'string') {
                        return { name: v, description: '' };
                    }
                    return v;
                });

                // Формируем описание для растения, если его нет
                let plantDescription = plant.description || 'Описание отсутствует.';

                html += `
                    <div class="plant-card">
                        <div class="plant-header" onclick="togglePlant('${plantId}')">
                            <span class="plant-name">${plant.name}</span>
                            ${plant.size ? `<span class="plant-size">${plant.size}</span>` : ''}
                            <span class="toggle-icon" id="${plantId}-icon">▼</span>
                        </div>
                        <div class="varieties-container" id="${plantId}">
                            <div style="padding: 6px 12px; font-size: 0.75rem; color: #88ddff; border-bottom: 1px solid #1a2a3e; margin-bottom: 4px;">
                                ${plantDescription}
                                ${plant.infoLink ? `<br><a href="${plant.infoLink}" target="_blank" class="info-link">📄 Подробнее на сайте →</a>` : ''}
                            </div>
                `;

                varieties.forEach((v, vIdx) => {
                    const varietyId = `${plantId}-var-${vIdx}`;
                    const varietyName = v.name;
                    // Если у сорта нет своего описания, используем описание растения
                    const varietyDesc = v.description || plantDescription;

                    html += `
                        <div class="variety-item">
                            <div class="variety-header" onclick="toggleVariety('${varietyId}')">
                                <span class="variety-name">${varietyName}</span>
                                <span class="variety-toggle" id="${varietyId}-icon">▶</span>
                            </div>
                            <div class="variety-description" id="${varietyId}">
                                ${varietyDesc}
                            </div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            plantList.innerHTML = html;
        }

        // Функции для раскрытия
        window.togglePlant = function(id) {
            const container = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            if (container) {
                container.classList.toggle('open');
                if (icon) {
                    icon.classList.toggle('open');
                }
            }
        };

        window.toggleVariety = function(id) {
            const desc = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            if (desc) {
                desc.classList.toggle('open');
                if (icon) {
                    icon.classList.toggle('open');
                }
            }
        };

        // Поиск с задержкой
        let searchTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                renderCatalog(this.value);
            }, 200);
        });

        // Первоначальный рендеринг
        renderCatalog();
    </script>
</body>
</html>
